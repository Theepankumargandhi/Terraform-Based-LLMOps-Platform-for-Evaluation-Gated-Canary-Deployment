name: deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CONTAINER_NAME: llmops-api
  CONTAINER_PORT: "8080"

jobs:
  deploy-candidate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deployment helpers
        run: python -m pip install --upgrade pip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_URL }}
        run: |
          IMAGE_URI="${ECR_REPOSITORY}:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Fetch current task definition
        env:
          TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
        run: |
          aws ecs describe-task-definition --task-definition "${TASK_FAMILY}" --query taskDefinition > deploy/current-taskdef.json

      - name: Register candidate task definition
        run: |
          jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
             | .containerDefinitions[0].image = env.IMAGE_URI' deploy/current-taskdef.json > deploy/taskdef.candidate.json
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://deploy/taskdef.candidate.json --query taskDefinition.taskDefinitionArn --output text)
          echo "TASK_DEF_ARN=${TASK_DEF_ARN}" >> "$GITHUB_ENV"

      - name: Render appspec
        run: |
          python scripts/render_appspec.py \
            --task-definition-arn "${TASK_DEF_ARN}" \
            --container-name "${CONTAINER_NAME}" \
            --container-port "${CONTAINER_PORT}" \
            --output deploy/appspec.json

      - name: Upload deployment bundle to S3
        env:
          ARTIFACT_BUCKET: ${{ vars.ARTIFACT_BUCKET_NAME }}
        run: |
          aws s3 cp deploy/appspec.json "s3://${ARTIFACT_BUCKET}/deployments/${GITHUB_SHA}/appspec.json"

      - name: Create CodeDeploy deployment
        env:
          CODEDEPLOY_APP: ${{ vars.CODEDEPLOY_APP_NAME }}
          CODEDEPLOY_GROUP: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          ARTIFACT_BUCKET: ${{ vars.ARTIFACT_BUCKET_NAME }}
        run: |
          aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP}" \
            --deployment-group-name "${CODEDEPLOY_GROUP}" \
            --revision "revisionType=S3,s3Location={bucket=${ARTIFACT_BUCKET},key=deployments/${GITHUB_SHA}/appspec.json,bundleType=JSON}"
